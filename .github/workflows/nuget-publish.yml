name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        required: true

permissions:
  contents: read
  id-token: write  # Required for NuGet trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget  # Environment for trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: dotnet build ErrorOrX.slnx -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --solution ErrorOrX.slnx -c Release --no-build

      - name: Pack ErrorOrX
        run: dotnet pack src/ErrorOrX/ErrorOrX.csproj -c Release -o artifacts -p:Version=${{ steps.version.outputs.version }} --no-build

      - name: Pack ErrorOrX.Generators
        run: dotnet pack src/ErrorOrX.Generators/ErrorOrX.Generators.csproj -c Release -o artifacts -p:Version=${{ steps.version.outputs.version }} --no-build

      # Trusted Publishing (OIDC): exchange the GitHub Actions id-token for a short-lived (1h) NuGet key.
      # No stored API key — nothing to expire or leak. user = ${{ secrets.NUGET_USER }} (the nuget.org
      # account that owns the trusted-publishing policy) keeps this YAML account-agnostic and portable
      # across repos/orgs. Requires permissions.id-token: write (above), environment: nuget, and the
      # nuget.org trusted-publishing policy (repo ANcpLua/ErrorOrX, this workflow, environment 'nuget').
      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --skip-duplicate
